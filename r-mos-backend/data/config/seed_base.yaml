# R-MOS 种子数据配置文件
# 修改此文件以调整种子数据，无需修改 Python 代码。
# 运行 scripts/seed_data.py 将此文件中的数据导入数据库。

# 默认机器人型号（用于 SOP 的 applicable_model 字段）
robot_model: "MOCK_HUMANOID_V1"

# ============================================================
# SOP 标准操作规程种子数据
# ============================================================
sops:
  - name: "电机过热故障排查"
    description: "当机器人电机温度超过安全阈值时的标准排查流程"
    applicable_model: "MOCK_HUMANOID_V1"
    category: "故障排查"
    difficulty_level: "medium"
    estimated_time: 900
    steps:
      - step_index: 1
        title: "安全断电检查"
        description: "确认机器人已安全断电，防止触电风险"
        expected_action: "verify"
        is_critical: true
        timeout_seconds: 120
        allow_skip: false
        hints:
          - "检查电源指示灯是否熄灭"
          - "使用万用表验证电压为0"
        tools_required:
          - "万用表"
          - "绝缘手套"
      - step_index: 2
        title: "检查散热系统"
        description: "检查风扇是否正常工作，散热片是否堵塞"
        expected_action: "inspect"
        is_critical: false
        timeout_seconds: 300
        hints:
          - "用手感受风扇出风"
          - "检查散热片灰尘"
        tools_required:
          - "手电筒"
      - step_index: 3
        title: "测量电机温度"
        description: "使用红外温度计测量电机表面温度"
        target_part: "knee_right"
        expected_action: "measure"
        is_critical: true
        timeout_seconds: 180
        hints:
          - "等待5分钟后再测量"
          - "记录温度读数"
        tools_required:
          - "红外温度计"

  - name: "关节校准SOP"
    description: "机器人关节位置校准标准流程"
    applicable_model: "MOCK_HUMANOID_V1"
    category: "维护保养"
    difficulty_level: "low"
    estimated_time: 600
    steps:
      - step_index: 1
        title: "系统自检"
        description: "运行系统自检程序，确认所有传感器正常"
        expected_action: "test"
        is_critical: true
        timeout_seconds: 120
      - step_index: 2
        title: "零位校准"
        description: "将所有关节移动到零位"
        expected_action: "calibrate"
        is_critical: true
        timeout_seconds: 300

  - name: "日常巡检"
    description: "每日例行巡检流程"
    applicable_model: "MOCK_HUMANOID_V1"
    category: "维护保养"
    difficulty_level: "low"
    estimated_time: 300
    steps:
      - step_index: 1
        title: "外观检查"
        description: "检查机器人外观是否有损伤"
        expected_action: "inspect"
        is_critical: false
        timeout_seconds: 120
      - step_index: 2
        title: "连接检查"
        description: "检查所有电缆连接是否牢固"
        expected_action: "inspect"
        is_critical: true
        timeout_seconds: 180

# ============================================================
# 故障案例种子数据
# ============================================================
fault_cases:
  - fault_code: "E001_OVERHEAT"
    name: "电机过热"
    category: "温度异常"
    description: "电机运行温度超过安全阈值"
    severity: "high"
    affected_parts:
      - "knee_right"
      - "knee_left"
    symptoms:
      - "温度传感器读数>70℃"
      - "电机表面烫手"
      - "散热风扇高速运转"
    diagnosis_steps:
      - "检查温度传感器读数"
      - "检查散热风扇是否正常"
      - "检查环境温度"
    solution_steps:
      - "立即停机"
      - "检查散热系统"
      - "降低负载"

  - fault_code: "E002_STALL"
    name: "关节卡死"
    category: "机械故障"
    description: "关节无法移动或移动受阻"
    severity: "high"
    affected_parts:
      - "knee_right"
    symptoms:
      - "关节速度为0"
      - "扭矩异常增大"
      - "异常噪音"
    diagnosis_steps:
      - "检查关节是否有异物"
      - "检查润滑情况"
      - "检查机械磨损"
    solution_steps:
      - "断电检查"
      - "清理异物"
      - "添加润滑油"

  - fault_code: "E003_VOLTAGE_DROP"
    name: "电压骤降"
    category: "电气故障"
    description: "供电电压低于正常范围"
    severity: "medium"
    affected_parts:
      - "main_power"
    symptoms:
      - "电池电量快速下降"
      - "电压<20V"
      - "性能下降"
    diagnosis_steps:
      - "检查电池电量"
      - "测量供电电压"
      - "检查电源模块状态"
    solution_steps:
      - "更换电池"
      - "检查电源模块"
      - "检查线路"

  - fault_code: "E004_SENSOR_FAILURE"
    name: "传感器失效"
    category: "传感器故障"
    description: "传感器数据异常或无响应"
    severity: "medium"
    affected_parts:
      - "imu_main"
    symptoms:
      - "传感器读数不变"
      - "数据噪声大"
      - "通信超时"
    diagnosis_steps:
      - "检查传感器连接"
      - "检查通信状态"
      - "验证传感器数据"
    solution_steps:
      - "检查接线"
      - "更换传感器"
      - "屏蔽干扰"

  - fault_code: "E005_JOINT_LOOSE"
    name: "关节松动"
    category: "机械故障"
    description: "关节固定螺丝松动导致位置不准"
    severity: "low"
    affected_parts:
      - "hip_right"
      - "hip_left"
    symptoms:
      - "位置噪声大"
      - "重复定位精度差"
      - "异常晃动"
    diagnosis_steps:
      - "检查关节固定螺丝"
      - "测试重复定位精度"
      - "检查固定件磨损"
    solution_steps:
      - "紧固螺丝"
      - "更换固定件"
      - "添加防松胶"

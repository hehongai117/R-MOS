[pytest]
pythonpath = .
# 只收集本项目测试；避免裸 pytest 递归扫描上传的第三方机器人资产测试
# (data/robot-assets/*/uploads/*/tests) 与辅助脚本导致的收集错误。
testpaths = tests
norecursedirs = data scripts venv .git __pycache__ *.egg-info
addopts = -q
markers =
    e2e: end-to-end integration tests for cross-service workflows
    characterization: 特征测试(锁定现状行为,重构安全网;修 bug 时按新规格更新断言)
    regression: 已修复 bug 的回归测试(断言正确行为,永不放松)

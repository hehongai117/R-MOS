name: Integration CI

on:
  pull_request:
    branches: [main]
    paths:
      - "r-mos-backend/**"
      - ".github/workflows/integration-ci.yml"

jobs:
  integration-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: r-mos-backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rmos_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d rmos_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/rmos_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: r-mos-backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Alembic upgrade head
        run: alembic upgrade head

      - name: Start backend
        run: |
          nohup uvicorn main:app --host 127.0.0.1 --port 8000 >/tmp/rmos_backend_ci.log 2>&1 &
          echo $! > /tmp/rmos_backend_ci.pid

      - name: Wait for backend health
        run: |
          for i in {1..45}; do
            if curl -fsS http://127.0.0.1:8000/api/v1/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend health check failed"
          tail -n 200 /tmp/rmos_backend_ci.log || true
          exit 1

      - name: Run E2E tests
        run: pytest tests/e2e/ -v --tb=long

      - name: Upload backend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-backend-log
          path: /tmp/rmos_backend_ci.log

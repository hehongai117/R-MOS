version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rmos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-rmos}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rmos}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./r-mos-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-rmos}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-rmos}
      SECRET_KEY: ${SECRET_KEY:-dev-only-change-me}
      DEBUG: "${DEBUG:-true}"
      CORS_ORIGINS: '["http://localhost", "http://localhost:3000"]'
      ROBOT_MODE: ${ROBOT_MODE:-simulation}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      LLM_ENABLE_MOCK_FALLBACK: "true"
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_PUBLIC_ENDPOINT_URL: ${S3_PUBLIC_ENDPOINT_URL:-http://localhost:9000}
      S3_BUCKET: ${S3_BUCKET:-rmos-assets}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-rmos-minio}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-rmos-minio-secret}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./r-mos-backend/data/robot-assets:/app/data/robot-assets

  frontend:
    build: ./r-mos-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-rmos-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-rmos-minio-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  miniodata:
